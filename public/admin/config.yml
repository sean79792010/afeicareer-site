# Sveltia CMS 設定 — 霏霏發文後台
# fields 對齊 src/content.config.ts 的 posts schema（title/pubDatetime/description 必填）
backend:
  name: github
  repo: sean79792010/afeicareer-site
  branch: main
  base_url: https://sveltia-cms-auth.sean79792010.workers.dev

# 內文貼圖上傳位置（Astro 把 public/ 直接掛在網站根目錄）
media_folder: public/images/uploads
public_folder: /images/uploads

# 介面語言
locale: zh-TW

collections:
  - name: posts
    label: 文章
    label_singular: 文章
    folder: src/content/posts
    create: true
    slug: "{{fields.slug}}"          # 用下方英文 slug 欄位當檔名/網址，避免中文標題產生亂碼網址
    summary: "{{title}}"
    sortable_fields: [pubDatetime, title]
    fields:
      - { name: title, label: 標題, widget: string }
      - { name: slug, label: 網址代稱（英文小寫、用 - 連字）, widget: string, hint: "例：nursing-career-map，只用英文/數字/連字號，決定文章網址" }
      # format 帶 Z(+08:00 offset)避免存成無時區字串被當 UTC → 文章被誤判成未來排程而隱藏
      - { name: pubDatetime, label: 發佈時間, widget: datetime, format: "YYYY-MM-DDTHH:mm:ssZ", picker_utc: false }
      - { name: description, label: 摘要（SEO 用，1-2 句）, widget: text }
      - { name: tags, label: 標籤, widget: list, default: ["others"] }
      - { name: draft, label: 草稿（打勾＝不公開）, widget: boolean, default: true }
      - { name: featured, label: 精選（放首頁）, widget: boolean, default: false, required: false }
      - { name: body, label: 內文, widget: markdown }
      - name: faq
        label: 常見問答（FAQ，可留空）
        label_singular: 問答
        hint: 填了會自動在文末產生「常見問題」區塊，並輸出 SEO/AI 搜尋用的 FAQ 結構化資料
        widget: list
        required: false
        summary: "{{fields.question}}"
        fields:
          - { name: question, label: 問題, widget: string }
          - { name: answer, label: 回答, widget: text }
